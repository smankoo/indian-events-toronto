<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Indian Events Toronto</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0a0f;
    color: #e8e8e8;
    min-height: 100vh;
}

.container {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 48px;
}

.header {
    text-align: center;
    margin-bottom: 32px;
}

.header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
}

.header .handle {
    color: #FF9933;
    font-size: 14px;
    font-weight: 600;
}

.header .subtitle {
    color: #888;
    font-size: 13px;
    margin-top: 8px;
}

.event-card {
    display: block;
    background: #16161c;
    border: 1px solid #2a2a35;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 12px;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.2s, transform 0.1s;
}

.event-card:hover {
    border-color: #FF9933;
    transform: translateY(-1px);
}

.event-card .poster {
    width: 100%;
    border-radius: 8px;
    margin-bottom: 12px;
    aspect-ratio: 4/5;
    object-fit: cover;
}

.event-card .date {
    color: #FF9933;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 6px;
}

.event-card .title {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
    line-height: 1.3;
}

.event-card .details {
    font-size: 13px;
    color: #999;
    line-height: 1.5;
}

.event-card .details span {
    display: block;
}

.event-card .price {
    display: inline-block;
    margin-top: 8px;
    background: rgba(255, 153, 51, 0.15);
    color: #FF9933;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
}

.event-card .cta {
    display: block;
    margin-top: 10px;
    color: #FF9933;
    font-size: 13px;
    font-weight: 600;
}

.empty {
    text-align: center;
    color: #666;
    padding: 40px 0;
    font-size: 15px;
}

.footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid #1a1a24;
    color: #555;
    font-size: 12px;
}
</style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>Indian Events Toronto</h1>
        <div class="handle">@indian.events.toronto</div>
        <div class="subtitle">Upcoming Indian events in Toronto &amp; GTA. Tap to get tickets.</div>
    </div>
    <p class="empty">No upcoming events right now. Check back soon!</p>
    <div class="footer">Updated Mar 22, 2026</div>
</div>
</body>
</html>
