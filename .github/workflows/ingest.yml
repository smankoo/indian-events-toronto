name: Ingest Events

on:
  schedule:
    # Twice daily: 7am and 3pm EDT (UTC-4). Runs 1hr before post workflow.
    - cron: "0 11 * * *"
    - cron: "0 19 * * *"
  workflow_dispatch:
    inputs:
      classify_limit:
        description: "Max events to classify (LLM calls)"
        type: number
        default: 10

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    concurrency:
      group: ingest-events
      cancel-in-progress: false

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Ingest and classify events
        run: |
          CLASSIFY_LIMIT=${{ inputs.classify_limit || 10 }}
          CLASSIFY_LIMIT=${CLASSIFY_LIMIT%.*}
          .venv/bin/python main.py --ingest --classify-limit $CLASSIFY_LIMIT

      - name: Commit updated database
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .venv/bin/python -c "import sqlite3; c=sqlite3.connect('data/events.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"
          git add data/events.db
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update events database (ingest) [skip ci]"
          # Retry push if another workflow pushed first (binary DB can't merge)
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), pulling and recommitting..."
            git pull --rebase --strategy-option=theirs origin main
            .venv/bin/python -c "import sqlite3; c=sqlite3.connect('data/events.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"
            git add data/events.db
            git diff --cached --quiet || git commit -m "Update events database (ingest) [skip ci]"
          done
