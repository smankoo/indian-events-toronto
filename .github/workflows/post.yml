name: Post to Instagram + Facebook

on:
  schedule:
    # Twice daily: 8am and 4pm EDT (offset 1hr from ingest to let it finish first)
    - cron: "0 12 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      post_limit:
        description: "Max posts per run"
        type: number
        default: 2
      dry_run:
        description: "Dry run (show what would be posted without publishing)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: instagram-posts
      cancel-in-progress: false

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt

      - name: Refresh Instagram token
        if: inputs.dry_run != true
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Refreshing Instagram access token..."
          RESPONSE=$(curl -s "https://graph.instagram.com/v21.0/refresh_access_token?grant_type=ig_refresh_token&access_token=$INSTAGRAM_ACCESS_TOKEN")
          NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null)
          if [ -n "$NEW_TOKEN" ]; then
            EXPIRES=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('expires_in','?'))" 2>/dev/null)
            echo "Token refreshed (expires in ${EXPIRES}s)"
            echo "INSTAGRAM_ACCESS_TOKEN=$NEW_TOKEN" >> "$GITHUB_ENV"
            echo "$NEW_TOKEN" | gh secret set INSTAGRAM_ACCESS_TOKEN
            echo "Secret updated for future runs"
          else
            echo "::warning::Token refresh failed: $RESPONSE (continuing with current token)"
          fi

      - name: Reconcile DB with Instagram
        if: inputs.dry_run != true
        run: .venv/bin/python main.py --reconcile

      - name: Generate images and publish
        run: |
          POST_LIMIT=${{ inputs.post_limit || 2 }}
          POST_LIMIT=${POST_LIMIT%.*}
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            .venv/bin/python main.py --post --dry-run --no-stories --post-limit $POST_LIMIT
          else
            .venv/bin/python main.py --post --no-stories --post-limit $POST_LIMIT
          fi

      - name: Commit updated database and link-in-bio
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .venv/bin/python -c "import sqlite3; c=sqlite3.connect('data/events.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"
          git add data/events.db docs/
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update events database and link-in-bio (post) [skip ci]"
          # Retry push if another workflow pushed first (binary DB can't merge)
          for i in 1 2 3; do
            git push && break
            echo "Push failed (attempt $i), pulling and recommitting..."
            git pull --rebase --strategy-option=theirs origin main
            .venv/bin/python -c "import sqlite3; c=sqlite3.connect('data/events.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"
            git add data/events.db docs/
            git diff --cached --quiet || git commit -m "Update events database and link-in-bio (post) [skip ci]"
          done

      - name: Deploy to GitHub Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: post
    if: always()
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
