name: Scrape & Post to Instagram + Facebook

on:
  schedule:
    # Twice daily: 10am and 6pm ET (UTC-5)
    - cron: "0 15 * * *"
    - cron: "0 23 * * *"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to Instagram"
        type: boolean
        default: true
      post_limit:
        description: "Max posts per run"
        type: number
        default: 2
      publish_only:
        description: "Only publish (skip scrape/generate)"
        type: boolean
        default: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  post:
    runs-on: ubuntu-latest
    concurrency:
      group: instagram-pipeline
      cancel-in-progress: false

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
      INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
      SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      FACEBOOK_PAGE_ID: ${{ secrets.FACEBOOK_PAGE_ID }}
      FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -r requirements.txt
          .venv/bin/playwright install chromium --with-deps

      - name: Refresh Instagram token
        if: inputs.publish != false
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "Refreshing Instagram access token..."
          RESPONSE=$(curl -s "https://graph.instagram.com/v21.0/refresh_access_token?grant_type=ig_refresh_token&access_token=$INSTAGRAM_ACCESS_TOKEN")
          NEW_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])" 2>/dev/null)
          if [ -n "$NEW_TOKEN" ]; then
            EXPIRES=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('expires_in','?'))" 2>/dev/null)
            echo "Token refreshed (expires in ${EXPIRES}s)"
            echo "INSTAGRAM_ACCESS_TOKEN=$NEW_TOKEN" >> "$GITHUB_ENV"
            echo "$NEW_TOKEN" | gh secret set INSTAGRAM_ACCESS_TOKEN
            echo "Secret updated for future runs"
          else
            echo "::warning::Token refresh failed: $RESPONSE (continuing with current token)"
          fi

      - name: Run pipeline
        run: |
          if [ "${{ inputs.publish_only }}" = "true" ]; then
            .venv/bin/python main.py --publish-only --post-limit ${{ inputs.post_limit || 2 }}
          elif [ "${{ inputs.publish }}" = "false" ]; then
            .venv/bin/python main.py --post-limit ${{ inputs.post_limit || 2 }}
          else
            .venv/bin/python main.py --publish --post-limit ${{ inputs.post_limit || 2 }}
          fi

      - name: Commit updated database
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          .venv/bin/python -c "import sqlite3; c=sqlite3.connect('data/events.db'); c.execute('PRAGMA wal_checkpoint(TRUNCATE)'); c.close()"
          git add data/events.db docs/
          git diff --cached --quiet && echo "No changes" || git commit -m "Update events database and link-in-bio [skip ci]"
          git push

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy-pages:
    needs: post
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
